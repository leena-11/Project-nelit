services:
  - type: web
    name: project-nelit-1
    runtime: python

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
      python manage.py seed_db

    startCommand: gunicorn smart_restaurant.wsgi:application

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

      - key: WEB_CONCURRENCY
        value: 2